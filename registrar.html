<!DOCTYPE html>
<html lang="pt=br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registrar.css">
    <title>Registrar-se</title>
</head>
<body>  
    <div class="container">
        <div class="login-box">
            <h1>Registrar-se</h1>
            <p class="subtitle">Bem-vindo a redline motors</p>
            
            <form action="index.html">
                <div class="input-field">


                 <div class="input-field">
                    <input type="text" id="nome" name="nome" required>
                    <label for="password">nome completo</label>
                </div>  

                <div class="input-field">
                    <input type="text" id="Idade" name="Idade" required>
                    <label for="password">Idade</label>
                </div> 


                    <input type="text" id="Gmail" name="Gmail" required>
                    <label for="username">Gmail</label>
                </div>

                 <div class="input-field">
                    <input type="text" id="CPF" name="CPF" required>
                    <label for="password">CPF</label>
                </div>

                <div class="input-field">
                    <input type="text" id="Endereço" name="Endereço" required>
                    <label for="password">Endereço</label>
                </div>

                <div class="input-field">
                    <input type="password" id="password" name="password" required>
                    <label for="password">Senha</label>
                </div>

                    <div class="input-field">
                    <input type="password" id="confirm-password" name="confirm-password" required>
                    <label for="password">confirmar senha </label>
                </div>

                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
        </div>
    </div>
    
</body>
</html>
