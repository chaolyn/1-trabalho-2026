<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Garage Pro</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="container">
        <div class="login-box">
            <h1>LOGIN</h1>
            <p class="subtitle">Bem-vindo de volta</p>
            
            <form action="index.html" method="post">
                <div class="input-field">
                    <input type="text" id="username" name="username" required>
                    <label for="username">Usuário</label>
                </div>

                <div class="input-field">
                    <input type="password" id="password" name="password" required>
                    <label for="password">Senha</label>
                </div>

                <button type="submit" class="btn-entrar">ENTRAR</button>

                <p class="footer-text">Não possui uma conta? <a href="registrar.html">Registrar</a></p>
            </form>
        </div>
    </div>
    <img src="fotolog.jpg" alt="Fundo de login" class="background-image">
</body>
</html>
